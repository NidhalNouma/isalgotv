{% load custom_tags %}
{% load i18n %}

<div class="flex justify-between items-center mb-2">
  <span class="text-text/60">{% trans 'Subtotal' %}</span>
  <span>${{ base_price|trim_zeros }}</span>
</div>

{% if coupon_off %}
  <div class="flex justify-between items-center mb-2 text-success">
    <span>{% trans 'Coupon Discount' %}</span>
    <span>{{ coupon_off }}</span>
  </div>
{% endif %}

<div class="flex justify-between items-center pt-2 border-t border-title/20 mt-2">
  <span class="font-medium text-text/60">{% trans 'Total' %}</span>
  <span class="font-medium text-lg">${{ final_price|trim_zeros }}</span>
</div>
